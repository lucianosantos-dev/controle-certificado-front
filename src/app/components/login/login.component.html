<section class="register-page">
  <aside class="hero-panel">
    <span class="brand-tag">INAP</span>
    <div class="hero-copy">
      <p class="hero-label">INAP</p>
      <h1>INSTITUTO NACIONAL DE ACELERAÇÃO PROFISSIONAL</h1>
      <p class="hero-description">
        Acesse sua conta para gerenciar certificados e continuar sua jornada.
      </p>
    </div>
  </aside>

  <article class="form-panel">
    <div class="card">
      <div class="card-header">
        <p class="eyebrow">Login</p>
        <h2>Entrar no sistema</h2>
        <p class="intro">Use seu username e senha para ter acesso ao seu perfil.</p>
      </div>

      <form action="#" method="post">
        <div class="field-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="Seu usuário" />
        </div>

        <div class="field-group">
          <label for="senha">Senha</label>
          <input id="senha" name="senha" type="password" placeholder="Mínimo 6 caracteres" />
        </div>

        <button type="submit" class="submit-button">
          Entrar
        </button>
      </form>
    </div>
  </article>
</section>
