<section class="painel-aluno-shell">
  <header class="painel-header">
    <div class="brand-block">
      <div class="brand-icon">INAP</div>
      <div>
        <strong>Instituto Nacional</strong>
        <span>Controle de Certificados</span>
      </div>
    </div>

    <div class="user-block">
      <div>
        Olá, <strong>{{ nomeUsuario }}</strong>
      </div>
      <button class="btn-sair" (click)="logout()" type="button">Sair</button>
    </div>
  </header>

  <main class="form-container">
    <div class="form-card">
      <h1>Solicitar Certificado</h1>
      <p class="subtitle">Preencha os dados abaixo para enviar sua solicitação.</p>

      <form class="aluno-form" [formGroup]="solicitacoesForms" (ngSubmit)="onSubmit()">
        <label class="full-width">
          <span>Nome completo</span>
          <input
            type="text"
            placeholder="Ex: Luciano Santos de Jesus Reis"
            formControlName="nomeAluno"
          />
        </label>

        <label class="full-width">
          <span>Curso</span>
          <input
            type="text"
            placeholder="Ex: Administração, Informática..."
            formControlName="curso"
          />
        </label>

        <label>
          <span>Data de conclusão</span>
          <input type="date" formControlName="dataConclusao" />
        </label>

        <label>
          <span>Telefone</span>
          <input type="tel" placeholder="(11) 99999-9999"
           maxlength="15" 
           (input)="somenteNumeros($event, 'telefone')" 
           formControlName="telefone"
           mask="(00) 00000-0000"
            />
        </label>

        <label class="full-width">
          <span>CPF</span>
          <input type="text" 
          placeholder="000.000.000-00"
           maxlength="14"
            (input)="somenteNumeros($event, 'cpf')" 
            formControlName="cpf"
            mask="000.000.000-00"
             />
        </label>

        <div class="escolha-formato full-width">
          <span class="label-titulo">Formato do certificado</span>

          <div class="format-cards">
            <label class="format-card">
              <input type="radio" formControlName="tipoCertificado" value="IMPRESSO" checked />
              <div class="card-icon">🖨️</div>
              <div class="card-text">
                <span class="card-title">Impresso</span>
                <span class="card-desc">Entrega física</span>
              </div>
            </label>

            <label class="format-card">
              <input type="radio" formControlName="tipoCertificado" value="DIGITAL" />
              <div class="card-icon">💻</div>
              <div class="card-text">
                <span class="card-title">Digital</span>
                <span class="card-desc">Arquivo PDF</span>
              </div>
            </label>
          </div>
        </div>

        <button class="btn-submit full-width" type="submit" [disabled]="solicitacoesForms.invalid">
          Enviar solicitação
        </button>
      </form>
    </div>
  </main>
</section>
